services:
  - type: web
    name: scraper-backend
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      python -m playwright install chromium --with-deps
    startCommand: python main.py
    envVars:
      - key: BROWSER_HEADLESS
        value: "true"
      - key: LLM_PROVIDER
        value: groq
      - key: LLM_MODEL
        value: llama3-8b-8192
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
